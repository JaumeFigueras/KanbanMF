# KanbanMF — Apache vhost.
#
# Single public entry point: https://kanban.example.com:443. Nothing else is
# reachable from the internet — the FastAPI backend listens on 127.0.0.1:8000
# only, PostgreSQL listens on localhost only, and there is no separate
# frontend process (the React app is a static build, served directly by
# Apache from frontend/dist). Port 80 exists solely to redirect to HTTPS and
# to answer the ACME HTTP-01 challenge for certificate renewal.
#
# Substitute kanban.example.com and the /home/kanbanmf/... paths below for
# your own before enabling this site.
#
# Required modules (enable once):
#   a2enmod ssl proxy proxy_http proxy_wstunnel rewrite headers
#   a2ensite kanbanmf
#   systemctl reload apache2

<VirtualHost *:80>
    ServerName kanban.example.com

    # Let certbot answer the ACME challenge directly over :80 — this must
    # come before the blanket HTTPS redirect below, or renewal breaks.
    Alias /.well-known/acme-challenge/ /var/www/certbot/.well-known/acme-challenge/
    <Directory /var/www/certbot>
        Require all granted
    </Directory>

    RewriteEngine on
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>

<VirtualHost *:443>
    ServerName kanban.example.com
    Protocols h2 http/1.1

    # Built frontend (cd frontend && npm run build) — a static SPA, not a
    # running Node process.
    DocumentRoot /home/kanbanmf/KanbanMF/frontend/dist

    ErrorLog  ${APACHE_LOG_DIR}/kanbanmf-error.log
    CustomLog ${APACHE_LOG_DIR}/kanbanmf-access.log combined

    SSLEngine on
    Include /etc/letsencrypt/options-ssl-apache.conf
    SSLCertificateFile    /etc/letsencrypt/live/kanban.example.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/kanban.example.com/privkey.pem
    ServerSignature Off

    <Directory /home/kanbanmf/KanbanMF/frontend/dist>
        Require all granted
        Options -Indexes
    </Directory>

    # index.html must never be cached — it's what points the browser at the
    # current content-hashed JS/CSS bundle. Those hashed bundle files, in
    # contrast, are safe to cache hard: a new build gets new filenames, so a
    # stale cached copy of one is never served under a name the new build
    # still uses.
    <Files "index.html">
        Header set Cache-Control "no-cache"
    </Files>
    <FilesMatch "\.(js|css|svg|png|jpg|jpeg|webp|woff2?)$">
        Header set Cache-Control "public, max-age=31536000, immutable"
    </FilesMatch>

    # The backend API, proxied to the loopback-only uvicorn process — most
    # specific ProxyPass wins regardless of declaration order, so the /ws
    # rule below only needs to exist for the websocket upgrade case.
    ProxyPass        /api/v1/ws  ws://127.0.0.1:8000/api/v1/ws
    ProxyPassReverse /api/v1/ws  ws://127.0.0.1:8000/api/v1/ws

    ProxyPass        /api  http://127.0.0.1:8000/api
    ProxyPassReverse /api  http://127.0.0.1:8000/api

    # Everything else that isn't a real static file and isn't /api falls
    # back to index.html — react-router-dom's BrowserRouter then handles the
    # route client-side. This is what makes a hard refresh on e.g.
    # /boards/<id> work instead of 404ing.
    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/api/
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteRule ^ /index.html [L]
</VirtualHost>
